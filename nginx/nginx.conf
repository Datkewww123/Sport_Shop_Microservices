events {
  worker_connections 1024;
}

http {
  server {
    listen 80;

    # Identity Service — auth và users
    location /api/auth {
      proxy_pass http://identity-service:3001/api/auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/users {
      proxy_pass http://identity-service:3001/api/users;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # Catalog Service — products, brands, categories
    location /api/products {
      proxy_pass http://catalog-service:3002/api/products;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/brands {
      proxy_pass http://catalog-service:3002/api/brands;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/categories {
      proxy_pass http://catalog-service:3002/api/categories;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # Order Service — orders
    location /api/orders {
      proxy_pass http://order-service:3003/api/orders;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # Monolith — cart, inventory, news, promotions, wishlist (còn lại)
    location /api {
      proxy_pass http://monolith:3000/api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location / {
      proxy_pass http://monolith:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}