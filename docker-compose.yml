services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-service:
    build: ./identity-service
    expose:
      - "3001"
    env_file: ./identity-service/.env
    environment:
      - CATALOG_SERVICE_URL=http://catalog-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
    depends_on:         
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build: ./catalog-service
    expose:
      - "3002"
    env_file: ./catalog-service/.env
    depends_on:         # ← thêm block này
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./order-service
    expose:
      - "3003"
    env_file: ./order-service/.env
    environment:
      - CATALOG_SERVICE_URL=http://catalog-service:3002
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      mysql:            # ← thêm 2 dòng này
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: ./payment-service
    expose:
      - "3004"
    env_file: ./payment-service/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./notification-service
    expose:
      - "3005"
    env_file: ./notification-service/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
volumes:
  mysql_data: