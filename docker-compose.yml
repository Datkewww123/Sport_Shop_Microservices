services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      monolith:
        condition: service_healthy

  identity-service:
    build: ./identity-service
    expose:
      - "3001"
    env_file: ./identity-service/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build: ./catalog-service
    expose:
      - "3002"
    env_file: ./catalog-service/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./order-service
    expose:
      - "3003"
    env_file: ./order-service/.env
    environment:
      # Override CATALOG_SERVICE_URL dùng Docker internal hostname (thay vì localhost trong .env)
      - CATALOG_SERVICE_URL=http://catalog-service:3002
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  monolith:
    build: ./Backend
    expose:
      - "3000"
    env_file: ./Backend/.env
    environment:
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./Frontend
      args:
        # VITE_API_URL phải truyền lúc BUILD (build arg), không phải runtime environment
        # Nếu deploy lên server khác, đổi giá trị này thành IP/domain của server đó
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
